<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1220" />
    <title>Keepsake — a book made just for her</title>
    <meta name="description" content="Turn a PDF into a beautiful flipbook you can send with a single link." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: {
                DEFAULT: "#1c1220",
                soft: "#2a1a28",
                deep: "#120b16",
              },
              parchment: {
                DEFAULT: "#f6ecd9",
                dim: "#ece0c6",
              },
              wine: {
                DEFAULT: "#6f2439",
                deep: "#4c1728",
              },
              blush: "#e7b3ad",
              gold: {
                DEFAULT: "#c69a4b",
                bright: "#e3bd72",
              },
              mist: "#b9a5a2",
            },
            fontFamily: {
              display: ["'Cormorant Garamond'", "serif"],
              body: ["'Instrument Sans'", "sans-serif"],
            },
            boxShadow: {
              seal: "0 6px 16px -4px rgba(198, 154, 75, 0.55)",
              book: "0 40px 80px -20px rgba(0,0,0,0.6)",
            },
          },
        },
      };
    </script>

    <style>
      html { background: #1c1220; }
      ::selection { background: #c69a4b; color: #1c1220; }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      :focus-visible {
        outline: 2px solid #e3bd72;
        outline-offset: 3px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body class="bg-ink text-parchment font-body antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
